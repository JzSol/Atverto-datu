open_data_path: "./open-data"
output_path: "../local-data/regions"
duckdb_path: "../local-data/geodb.duckdb"
storage_mode: "local,duckdb"
mongodb_uri: "mongodb://localhost:27017"
database: "open_data"
collection: "properties"
kadastrs_field: "kadastrs"
batch_size: 500
drop_collection: false
log_level: "INFO"
layers:
  - id: "cadastre"
    label: "Cadastre"
    path: "./open-data"
    kadastrs_field: "kadastrs"
    geometry_type: "polygon"
    display:
      fill_color: "#f5c16c"
      fill_opacity: 0.15
      line_color: "#f59e0b"
      line_width: 1.5
      outline_color: "#ffffff"
      outline_width: 5
  - id: "biotopi"
    label: "Biotopi"
    path: "../dap_dati/Biotopi"
    geometry_type: "polygon"
    display:
      fill_color: "#ef4444"
      fill_opacity: 0.25
      line_color: "#dc2626"
      line_width: 1.5
  - id: "aizsargajamie_koki"
    label: "Aizsargajamie koki"
    path: "../dap_dati/Aizsargajamie_koki"
    geometry_type: "polygon"
    display:
      fill_color: "#f59e0b"
      fill_opacity: 0.25
      line_color: "#b45309"
      line_width: 1.4
  - id: "dabas_pieminekli"
    label: "Dabas pieminekli"
    path: "../dap_dati/Dabas_pieminekli"
    geometry_type: "polygon"
    display:
      fill_color: "#38bdf8"
      fill_opacity: 0.2
      line_color: "#0284c7"
      line_width: 1.4
  - id: "invazivas_sugas"
    label: "Invazivas sugas"
    path: "../dap_dati/ISV"
    geometry_type: "polygon"
    display:
      fill_color: "#fb7185"
      fill_opacity: 0.22
      line_color: "#e11d48"
      line_width: 1.4
  - id: "iadt"
    label: "IADT"
    path: "../dap_dati/Ipasi_aizsargajamas_dabas_teritorijas"
    geometry_type: "polygon"
    display:
      fill_color: "#60a5fa"
      fill_opacity: 0.18
      line_color: "#2563eb"
      line_width: 1.4
  - id: "sugas"
    label: "Sugas"
    path: "../dap_dati/Sugas"
    geometry_type: "mixed"
    display:
      fill_color: "#a78bfa"
      fill_opacity: 0.22
      line_color: "#7c3aed"
      line_width: 1.3
      circle_color: "#7c3aed"
      circle_radius: 4
